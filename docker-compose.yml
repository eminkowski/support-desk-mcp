services:
  postgres:
    image: postgres:16-alpine
    container_name: support-desk-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: supportdesk
      POSTGRES_PASSWORD: supportdesk
      POSTGRES_DB: supportdesk
    volumes:
      - support_desk_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U supportdesk -d supportdesk']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  support_desk_pgdata:
